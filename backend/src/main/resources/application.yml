server:
  port: 8081

spring:
  profiles:
    active: prod

---
spring.config.activate.on-profile: dev
spring:
  datasource:
    url: jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/migration/schema.sql
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: dGhpc0lzQVZlcnlTZWN1cmVKd3RTZWNyZXRLZXlGb3JUYXNrTWFuYWdlbWVudFN5c3RlbQ==
    expiration: 86400000

---
spring.config.activate.on-profile: prod
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/taskdb?sslMode=DISABLED&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: dGhpc0lzQVZlcnlTZWN1cmVKd3RTZWNyZXRLZXlGb3JUYXNrTWFuYWdlbWVudFN5c3RlbQ==
    expiration: 86400000
